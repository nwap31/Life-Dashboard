<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#050506" />
<title>Rules</title>
<!--
  RULES — Nolan's trading discipline tile (lives in the 'peak' slot, repurposed).
  One tap a day: did you trade your plan (FVG + OTE), or break a rule? The hero is
  the CLEAN STREAK; below it, 30-day adherence % and a 14-day strip. This is the
  main goal's true measure — days following the rules, not P&L.
  Store: { days: { 'YYYY-MM-DD': 'clean' | 'broke' } }
  — /sweep and save_data can file straight into it.
-->
<style>
  :root{
    --bg:#050506;--fg:#ededf0;--brand:#C17A54;--brand-soft:rgba(193,122,84,.10);
    --broke:#c96a5a;--muted:#84848c;--muted-strong:#a8a8b0;--border:#231b16;--border-strong:#33261d;
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
    --serif:Georgia,'Times New Roman',serif;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--fg);font:15px/1.5 var(--font);display:flex;justify-content:center;padding:40px 20px;-webkit-font-smoothing:antialiased;position:relative}
  body::before{content:'';position:fixed;inset:0;z-index:-2;pointer-events:none;background:
    radial-gradient(58% 44% at 50% -6%, rgba(193,122,84,.15), transparent 62%),
    radial-gradient(1.5px 1.5px at 14% 16%, rgba(255,255,255,.5), transparent 100%),
    radial-gradient(1px 1px at 76% 10%, rgba(255,255,255,.4), transparent 100%),
    radial-gradient(1.5px 1.5px at 52% 6%, rgba(255,255,255,.32), transparent 100%),
    radial-gradient(1px 1px at 30% 28%, rgba(255,255,255,.28), transparent 100%)}
  body::after{content:'';position:fixed;left:0;right:0;bottom:0;height:32vh;z-index:-1;pointer-events:none;background:
    linear-gradient(to top, rgba(26,18,12,.85), transparent 80%),
    linear-gradient(115deg, transparent 42%, rgba(30,21,15,.7) 43%, rgba(30,21,15,.7) 58%, transparent 59%),
    linear-gradient(245deg, transparent 38%, rgba(22,15,11,.9) 39%, rgba(22,15,11,.9) 62%, transparent 63%);
    -webkit-mask-image:linear-gradient(to top,#000 55%,transparent);mask-image:linear-gradient(to top,#000 55%,transparent)}
  .shell{width:100%;max-width:520px;text-align:center}
  h1{font-size:24px;font-weight:600;letter-spacing:-.01em;text-align:left}
  .sub{color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;margin:6px 0 0;text-align:left}

  .hero{margin-top:34px}
  .kick{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--brand)}
  .streak{font-family:var(--serif);font-style:italic;font-size:clamp(70px,17vw,110px);line-height:1;color:#fff;margin-top:6px;text-shadow:0 0 44px rgba(193,122,84,.28)}
  .streakLab{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  .pct{margin-top:16px;font-size:13px;color:var(--muted-strong)}
  .pct b{color:var(--brand);font-variant-numeric:tabular-nums}

  .ask{margin-top:26px;font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-strong)}
  .btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  .big{padding:18px 12px;border-radius:14px;border:1px solid var(--border-strong);background:transparent;color:var(--muted);font-weight:700;font-size:15px;cursor:pointer;transition:all .15s var(--ease);font-family:inherit}
  .big:hover{color:#fff;border-color:var(--muted)}
  .big.clean.on{color:#1a120b;background:linear-gradient(180deg,#d69a72,var(--brand));border-color:var(--brand);box-shadow:0 8px 26px -12px var(--brand)}
  .big.broke.on{color:#fff;background:rgba(201,106,90,.16);border-color:var(--broke);box-shadow:inset 0 0 0 1px rgba(201,106,90,.4)}

  .strip{display:flex;justify-content:center;gap:8px;margin-top:34px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:7px}
  .dot{width:16px;height:16px;border-radius:999px;border:1px solid var(--border-strong);background:transparent;transition:all .3s var(--ease)}
  .dot.clean{background:var(--brand);border-color:var(--brand);box-shadow:0 0 10px rgba(193,122,84,.4)}
  .dot.broke{background:transparent;border-color:var(--broke);box-shadow:inset 0 0 0 3px rgba(201,106,90,.5)}
  .dLab{font-family:var(--mono);font-size:8px;letter-spacing:.06em;color:var(--muted);text-transform:uppercase}
  .dLab.today{color:var(--brand)}
  .foot{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:30px}
</style>
</head>
<body>
<div class="shell">
  <h1>Rules</h1>
  <p class="sub">did you trade your plan? · FVG + OTE · one tap a day</p>
  <div class="hero" id="app"></div>
</div>
<script>
let store={};
function key(d){const x=d||new Date();return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');}
function persist(){window.Vitality.save(store)}
function days(){if(!store.days||typeof store.days!=='object')store.days={};return store.days}
/* streak: walk back from today; a broken rule ends it; unlogged days (weekends,
   no-trade days) are skipped, never counted, never a reset. */
function streak(){
  const d=days();let n=0;
  for(let i=0;i<400;i++){const dt=new Date();dt.setDate(dt.getDate()-i);const s=d[key(dt)];
    if(s==='broke')break; if(s==='clean')n++;}
  return n;
}
/* 30-day adherence = clean / (clean + broke), over logged days only. */
function adherence(){
  const d=days();let clean=0,logged=0;
  for(let i=0;i<30;i++){const dt=new Date();dt.setDate(dt.getDate()-i);const s=d[key(dt)];
    if(s==='clean'){clean++;logged++;}else if(s==='broke'){logged++;}}
  return logged?{pct:Math.round(clean/logged*100),logged}:null;
}
function render(){
  const d=days(),tk=key(),tstate=d[tk],st=streak(),ad=adherence();
  let strip='';
  for(let i=13;i>=0;i--){
    const dt=new Date();dt.setDate(dt.getDate()-i);const s=d[key(dt)]||'';
    const lab=i===0?'today':['SU','MO','TU','WE','TH','FR','SA'][dt.getDay()];
    strip+='<div class="cell"><div class="dot '+s+'" title="'+key(dt)+(s?' · '+s:'')+'"></div><span class="dLab'+(i===0?' today':'')+'">'+lab+'</span></div>';
  }
  document.getElementById('app').innerHTML=
    '<div class="kick">✦ clean streak</div>'
    +'<div class="streak">'+st+'</div>'
    +'<div class="streakLab">'+(st===1?'day by the rules':'days by the rules')+'</div>'
    +'<div class="pct">'+(ad?('<b>'+ad.pct+'%</b> of the last '+ad.logged+' logged '+(ad.logged===1?'day':'days')+' clean'):'log your first day below')+'</div>'
    +'<div class="ask">Did you trade your plan?</div>'
    +'<div class="btns">'
      +'<button class="big clean'+(tstate==='clean'?' on':'')+'" data-mark="clean">Clean</button>'
      +'<button class="big broke'+(tstate==='broke'?' on':'')+'" data-mark="broke">Broke a rule</button>'
    +'</div>'
    +'<div class="strip">'+strip+'</div>'
    +'<p class="foot">this is your main goal · discipline over P&amp;L</p>';
}
document.addEventListener('click',e=>{
  const b=e.target.closest('[data-mark]');if(!b)return;
  const k=key(),d=days(),m=b.getAttribute('data-mark');
  if(d[k]===m)delete d[k]; else d[k]=m; /* tap the active one again to clear */
  persist();render();
});
if(!window.Vitality){window.Vitality={save:function(d){try{localStorage.setItem('v:prev:peak',JSON.stringify(d));}catch(e){}return Promise.resolve(true);},load:function(){try{return Promise.resolve(JSON.parse(localStorage.getItem('v:prev:peak')||'{}'));}catch(e){return Promise.resolve({});}}};}
(async()=>{const d=await window.Vitality.load();store=(d&&typeof d==='object'&&!Array.isArray(d))?d:{};render();})();
</script>
</body>
</html>
