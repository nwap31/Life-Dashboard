<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#050506" />
<title>Learn</title>
<!--
  LEARN — Nolan's knowledge tile (lives in the 'brand' slot, repurposed).
  Three tracks toward becoming a credit analyst: Self-improvement, Markets,
  Fixed income. Tap a track to log a 25-min focus block. The week draws itself
  underneath. Store: { blocks: { 'YYYY-MM-DD': { self, markets, fixed } } }
  — /sweep and save_data can file straight into it.
-->
<style>
  :root{
    --bg:#050506;--fg:#ededf0;--brand:#C08A4E;--brand-soft:rgba(192,138,78,.09);
    --muted:#84848c;--muted-strong:#a8a8b0;--border:#221d18;
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
    --serif:Georgia,'Times New Roman',serif;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--fg);font:15px/1.5 var(--font);display:flex;justify-content:center;padding:40px 20px;-webkit-font-smoothing:antialiased;position:relative}
  body::before{content:'';position:fixed;inset:0;z-index:-2;pointer-events:none;background:
    radial-gradient(58% 44% at 50% -6%, rgba(192,138,78,.15), transparent 62%),
    radial-gradient(1.5px 1.5px at 14% 16%, rgba(255,255,255,.5), transparent 100%),
    radial-gradient(1px 1px at 76% 10%, rgba(255,255,255,.4), transparent 100%),
    radial-gradient(1.5px 1.5px at 52% 6%, rgba(255,255,255,.32), transparent 100%),
    radial-gradient(1px 1px at 30% 28%, rgba(255,255,255,.28), transparent 100%)}
  body::after{content:'';position:fixed;left:0;right:0;bottom:0;height:32vh;z-index:-1;pointer-events:none;background:
    linear-gradient(to top, rgba(26,20,12,.85), transparent 80%),
    linear-gradient(115deg, transparent 42%, rgba(30,23,15,.7) 43%, rgba(30,23,15,.7) 58%, transparent 59%),
    linear-gradient(245deg, transparent 38%, rgba(22,17,11,.9) 39%, rgba(22,17,11,.9) 62%, transparent 63%);
    -webkit-mask-image:linear-gradient(to top,#000 55%,transparent);mask-image:linear-gradient(to top,#000 55%,transparent)}
  .shell{width:100%;max-width:560px;text-align:center}
  h1{font-size:24px;font-weight:600;letter-spacing:-.01em;text-align:left}
  .sub{color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;margin:6px 0 0;text-align:left}

  .well{margin-top:40px}
  .kick{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--brand)}
  .count{font-family:var(--serif);font-style:italic;font-size:clamp(66px,16vw,100px);line-height:1;color:#fff;margin-top:8px;
    text-shadow:0 0 44px rgba(192,138,78,.28)}
  .of{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-top:8px}

  .tracks{display:flex;flex-direction:column;gap:10px;margin-top:26px}
  .track{display:flex;align-items:center;gap:10px;border:1px solid var(--border);border-radius:14px;padding:12px 14px;transition:border-color .15s}
  .track:hover{border-color:var(--muted)}
  .tName{flex:1;text-align:left;font-weight:600;font-size:14px}
  .tName small{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:400;margin-top:2px}
  .tCount{font-family:var(--mono);font-size:13px;color:var(--muted-strong);min-width:20px;text-align:right;font-variant-numeric:tabular-nums}
  .tBtn{width:38px;height:38px;border-radius:999px;border:none;background:linear-gradient(180deg,#d6a468,var(--brand));color:#1a1207;font-weight:800;font-size:19px;cursor:pointer;transition:transform .15s var(--ease)}
  .tBtn:hover{transform:translateY(-1px)}
  .tBtn:active{transform:scale(.95)}
  .tMinus{width:30px;height:30px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:16px;cursor:pointer}
  .tMinus:hover{color:#fff;border-color:var(--muted)}

  .week{display:flex;justify-content:center;align-items:flex-end;gap:10px;margin-top:36px;height:60px}
  .day{display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end}
  .bar{width:16px;border-radius:5px 5px 3px 3px;background:linear-gradient(180deg,var(--brand),rgba(192,138,78,.25));min-height:3px;transition:height .5s var(--ease)}
  .bar.zero{background:var(--border)}
  .dLab{font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase}
  .dLab.today{color:var(--brand)}
  .foot{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:30px}
</style>
</head>
<body>
<div class="shell">
  <h1>Learn</h1>
  <p class="sub">self-improvement · markets · fixed income → credit analyst</p>
  <div class="well" id="app"></div>
</div>
<script>
const TRACKS=[['self','Self-improvement','the inner game'],['markets','Markets','how price moves'],['fixed','Fixed income','the credit analyst road']];
const BLOCK=25; /* minutes per focus block */
let store={};
function key(d){const x=d||new Date();return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');}
function persist(){window.Vitality.save(store)}
function blocks(){if(!store.blocks||typeof store.blocks!=='object')store.blocks={};return store.blocks}
function day(k){const b=blocks();if(!b[k]||typeof b[k]!=='object')b[k]={self:0,markets:0,fixed:0};return b[k]}
function dayTotal(o){return (o.self||0)+(o.markets||0)+(o.fixed||0)}
function render(){
  const d=day(key()),n=dayTotal(d);
  let bars='';
  for(let i=6;i>=0;i--){
    const dt=new Date();dt.setDate(dt.getDate()-i);
    const o=blocks()[key(dt)]||{},c=dayTotal(o),h=Math.max(3,Math.min(60,(c/6)*60));
    const lab=i===0?'today':['SU','MO','TU','WE','TH','FR','SA'][dt.getDay()];
    bars+='<div class="day"><div class="bar'+(c?'':' zero')+'" style="height:'+h+'px" title="'+c+' blocks"></div><span class="dLab'+(i===0?' today':'')+'">'+lab+'</span></div>';
  }
  let rows='';
  for(const t of TRACKS){
    rows+='<div class="track"><div class="tName">'+t[1]+'<small>'+t[2]+'</small></div>'
      +'<span class="tCount">'+(d[t[0]]||0)+'</span>'
      +'<button class="tMinus" data-track="'+t[0]+'" data-dir="-1" aria-label="Remove one">−</button>'
      +'<button class="tBtn" data-track="'+t[0]+'" data-dir="1" aria-label="Log a block">+</button></div>';
  }
  document.getElementById('app').innerHTML=
    '<div class="kick">✦ focus blocks today</div>'
    +'<div class="count">'+n+'</div>'
    +'<div class="of">'+(n*BLOCK)+' min · '+BLOCK+' min a block</div>'
    +'<div class="tracks">'+rows+'</div>'
    +'<div class="week">'+bars+'</div>'
    +'<p class="foot">feeds your knowledge goal · the mentor notices the pattern</p>';
}
document.addEventListener('click',e=>{
  const b=e.target.closest('[data-track]');if(!b)return;
  const k=key(),o=day(k),tr=b.getAttribute('data-track');
  o[tr]=Math.max(0,(o[tr]||0)+parseInt(b.getAttribute('data-dir'),10));
  persist();render();
});
if(!window.Vitality){window.Vitality={save:function(d){try{localStorage.setItem('v:prev:brand',JSON.stringify(d));}catch(e){}return Promise.resolve(true);},load:function(){try{return Promise.resolve(JSON.parse(localStorage.getItem('v:prev:brand')||'{}'));}catch(e){return Promise.resolve({});}}};}
(async()=>{const d=await window.Vitality.load();store=(d&&typeof d==='object'&&!Array.isArray(d))?d:{};render();})();
</script>
</body>
</html>
